name: Web Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node LTS
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm install

      - name: Build web
        run: bash scripts/build_web.sh

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: web/

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Download web artifact
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: web/

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web
          keep_files: false

  deploy-pr:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Download web artifact
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: web/

      - name: Deploy PR preview to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web
          keep_files: true
          destination_dir: pr-${{ github.event.pull_request.number }}

      - name: Post or update PR preview comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-author: 'github-actions[bot]'
          issue-number: ${{ github.event.pull_request.number }}
          body-includes: 'Web preview'
          body: |
            🌐 **Web preview:** https://iyung.github.io/wip-3d/pr-${{ github.event.pull_request.number }}/

  cleanup-pr:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check if gh-pages branch exists
        id: branch-check
        run: |
          if git ls-remote --exit-code origin gh-pages; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout gh-pages branch
        if: steps.branch-check.outputs.exists == 'true'
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Delete PR preview directory
        if: steps.branch-check.outputs.exists == 'true'
        run: |
          PR_DIR="pr-${{ github.event.pull_request.number }}"
          if [ -d "$PR_DIR" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git rm -rf "$PR_DIR"
            git commit -m "cleanup: remove preview for PR #${{ github.event.pull_request.number }}"
            git push
          else
            echo "No preview directory found for $PR_DIR, skipping."
          fi
