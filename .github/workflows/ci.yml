name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install LÖVE 11.5
        run: |
          sudo add-apt-repository -y ppa:bartbes/love-stable
          sudo apt-get update -q
          sudo apt-get install -y love

      - name: Run tests
        run: love . --headless
